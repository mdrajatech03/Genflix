<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Love!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="balloons"></div>
        
        <h1 class="main-title">Happy Birthday, My Queen! 🎂</h1>
        
        <div class="cake">
            <div class="plate"></div>
            <div class="layer layer-bottom"></div>
            <div class="layer layer-middle"></div>
            <div class="layer layer-top"></div>
            <div class="candle">
                <div class="flame"></div>
            </div>
        </div>

        <button id="gift-btn" onclick="showSurprise()">Click for a Surprise 🎁</button>

        <div id="message-box" class="hidden">
            <h2>I Love You! ❤️</h2>
            <p>Aap meri life ki sabse badi khushi ho. May your day be as beautiful as your smile!</p>
            <div class="confetti"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
